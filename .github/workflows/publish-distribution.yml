name: Publish Distribution

# surface: elegy-obsidian (wrapper-only; packaged via scripts/package-wrapper-surface.ps1, not the CLI matrix above)

on:
  push:
    branches:
      - main
    tags:
      - v*
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-distribution-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  MAIN_RELEASE_TAG: main-snapshot

jobs:
  export-contracts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.95.0

      - name: Validate canonical authority inventory
        shell: pwsh
        run: |
          ./scripts/validate-canonical-outputs.ps1

      - name: Export contracts bundle
        shell: pwsh
        run: |
          ./scripts/export-contracts.ps1 -CreateArchive

      - name: Validate exported contracts bundle
        shell: pwsh
        run: |
          ./scripts/validate-canonical-outputs.ps1 -RequireGeneratedOutputs -RequireArchive

      - name: Upload exported contracts artifacts
        uses: actions/upload-artifact@v4
        with:
          name: elegy-contracts-artifacts-${{ github.sha }}
          if-no-files-found: error
          path: |
            artifacts/contracts/**

      - name: Upload contracts distribution archive
        uses: actions/upload-artifact@v4
        with:
          name: elegy-contracts-${{ github.sha }}
          if-no-files-found: error
          path: |
            artifacts/distribution/elegy-contracts-*.zip

  package-cli:
    name: package cli (${{ matrix.surface }}, ${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            surface: elegy-cli
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            surface: elegy-memory
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            surface: elegy-mcp
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            surface: elegy-planning
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            surface: elegy-skills
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            surface: elegy-configuration
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            surface: elegy-documentation
          - runner: windows-2022
            target: x86_64-pc-windows-msvc
            surface: elegy-cli
          - runner: windows-2022
            target: x86_64-pc-windows-msvc
            surface: elegy-memory
          - runner: windows-2022
            target: x86_64-pc-windows-msvc
            surface: elegy-mcp
          - runner: windows-2022
            target: x86_64-pc-windows-msvc
            surface: elegy-planning
          - runner: windows-2022
            target: x86_64-pc-windows-msvc
            surface: elegy-skills
          - runner: windows-2022
            target: x86_64-pc-windows-msvc
            surface: elegy-configuration
          - runner: windows-2022
            target: x86_64-pc-windows-msvc
            surface: elegy-documentation
          - runner: macos-14
            target: aarch64-apple-darwin
            surface: elegy-cli
          - runner: macos-14
            target: aarch64-apple-darwin
            surface: elegy-memory
          - runner: macos-14
            target: aarch64-apple-darwin
            surface: elegy-mcp
          - runner: macos-14
            target: aarch64-apple-darwin
            surface: elegy-planning
          - runner: macos-14
            target: aarch64-apple-darwin
            surface: elegy-skills
          - runner: macos-14
            target: aarch64-apple-darwin
            surface: elegy-configuration
          - runner: macos-14
            target: aarch64-apple-darwin
            surface: elegy-documentation
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: rust -> rust/target

      - name: Package CLI archive
        shell: pwsh
        run: |
          ./scripts/package-cli.ps1 -Surface '${{ matrix.surface }}' -Target '${{ matrix.target }}'

      - name: Upload CLI distribution artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.surface }}-${{ matrix.target }}-${{ github.sha }}
          if-no-files-found: error
          path: |
            artifacts/distribution/${{ matrix.surface }}-*.zip

  package-wrapper-surfaces:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Package wrapper archives
        shell: pwsh
        run: |
          ./scripts/package-wrapper-surface.ps1 -Surface elegy-memory,elegy-mcp,elegy-planning,elegy-skills,elegy-configuration,elegy-documentation,elegy-obsidian

      - name: Validate wrapper archives
        shell: pwsh
        run: |
          ./scripts/validate-canonical-outputs.ps1 -RequireWrapperArchives

      - name: Upload wrapper distribution artifact
        uses: actions/upload-artifact@v4
        with:
          name: elegy-wrapper-surfaces-${{ github.sha }}
          if-no-files-found: error
          path: |
            artifacts/distribution/elegy-memory-wrapper-*.zip
            artifacts/distribution/elegy-mcp-wrapper-*.zip
            artifacts/distribution/elegy-planning-wrapper-*.zip
            artifacts/distribution/elegy-skills-wrapper-*.zip
            artifacts/distribution/elegy-configuration-wrapper-*.zip
            artifacts/distribution/elegy-documentation-wrapper-*.zip
            artifacts/distribution/elegy-obsidian-wrapper-*.zip

  package-installer:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Package installer archive
        shell: pwsh
        run: |
          ./scripts/package-installer.ps1

      - name: Validate installer archive
        shell: pwsh
        run: |
          ./scripts/validate-canonical-outputs.ps1 -RequireInstallerArchives

      - name: Upload installer distribution artifact
        uses: actions/upload-artifact@v4
        with:
          name: elegy-installer-${{ github.sha }}
          if-no-files-found: error
          path: |
            artifacts/distribution/elegy-installer-*.zip

  publish:
    runs-on: ubuntu-latest
    needs:
      - export-contracts
      - package-cli
      - package-wrapper-surfaces
      - package-installer
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Prepare distribution staging directory
        shell: pwsh
        run: |
          if (Test-Path ./artifacts/distribution) {
            Remove-Item ./artifacts/distribution -Recurse -Force
          }

          New-Item -ItemType Directory -Path ./artifacts/distribution | Out-Null

      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: elegy-*-${{ github.sha }}
          merge-multiple: true
          path: artifacts/distribution

      - name: Resolve distribution tag
        id: release_meta
        shell: bash
        run: |
          set -euo pipefail

          tag_name="local-artifacts"
          release_title="Local artifacts"
          release_notes="Generated distribution artifacts for local validation."
          latest="false"

          if [[ "${GITHUB_EVENT_NAME}" == "release" ]]; then
            tag_name="${{ github.event.release.tag_name }}"
            release_title="Release ${tag_name}"
            release_notes="Published release assets for ${tag_name}."
            latest="true"
          elif [[ "${GITHUB_REF:-}" == refs/tags/v* ]]; then
            tag_name="${GITHUB_REF_NAME}"
            release_title="Release ${tag_name}"
            release_notes="Published release assets for ${tag_name}."
            latest="true"
          elif [[ "${GITHUB_REF:-}" == "refs/heads/main" ]]; then
            tag_name="${MAIN_RELEASE_TAG}"
            release_title="Main rolling release"
            release_notes="Rolling prerelease generated from main at ${GITHUB_SHA}."
          fi

          echo "tag_name=${tag_name}" >> "$GITHUB_OUTPUT"
          echo "release_title=${release_title}" >> "$GITHUB_OUTPUT"
          echo "release_notes=${release_notes}" >> "$GITHUB_OUTPUT"
          echo "latest=${latest}" >> "$GITHUB_OUTPUT"

      - name: Write release metadata
        shell: pwsh
        run: |
          ./scripts/write-distribution-manifest.ps1 -OutputDirectory ./artifacts/distribution -Tag '${{ steps.release_meta.outputs.tag_name }}'

      - name: Validate published distribution assets
        shell: pwsh
        run: |
          ./scripts/validate-canonical-outputs.ps1 -RequireArchive -RequireWrapperArchives -RequireInstallerArchives -RequireReleaseMetadata -DistributionDirectory ./artifacts/distribution

      - name: Attach published distribution assets to GitHub release
        if: ${{ github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main' }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.release_meta.outputs.tag_name }}
          RELEASE_TITLE: ${{ steps.release_meta.outputs.release_title }}
          RELEASE_NOTES: ${{ steps.release_meta.outputs.release_notes }}
          RELEASE_LATEST: ${{ steps.release_meta.outputs.latest }}
        run: |
          set -euo pipefail

          mapfile -t release_files < <(find artifacts/distribution -type f \( -name 'elegy-*.zip' -o -name 'elegy-release-*.json' \) | sort)
          expected_asset_count="${#release_files[@]}"

          if [[ "${#release_files[@]}" -eq 0 ]]; then
            echo "No published distribution assets were found to attach to release ${RELEASE_TAG}." >&2
            exit 1
          fi

          if [[ "${RELEASE_TAG}" == "${MAIN_RELEASE_TAG}" ]]; then
            if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
              gh release delete "${RELEASE_TAG}" --cleanup-tag --yes
            fi

            gh release create "${RELEASE_TAG}" "${release_files[@]}" \
              --target "${GITHUB_SHA}" \
              --title "${RELEASE_TITLE}" \
              --notes "${RELEASE_NOTES}" \
              --prerelease \
              --latest=false
          elif gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" "${release_files[@]}" --clobber
          else
            create_args=(
              "${RELEASE_TAG}"
              "${release_files[@]}"
              --title "${RELEASE_TITLE}"
              --notes "${RELEASE_NOTES}"
            )

            if [[ "${RELEASE_LATEST}" == "true" ]]; then
              create_args+=(--latest)
            else
              create_args+=(--latest=false)
            fi

            gh release create "${create_args[@]}"
          fi

          release_view_json="$(gh release view "${RELEASE_TAG}" --json tagName,isPrerelease,targetCommitish,assets)"
          release_target="$(jq -r '.targetCommitish // empty' <<<"${release_view_json}")"
          release_is_prerelease="$(jq -r '.isPrerelease' <<<"${release_view_json}")"
          release_asset_count="$(jq '.assets | length' <<<"${release_view_json}")"

          if [[ "${RELEASE_TAG}" == "${MAIN_RELEASE_TAG}" ]]; then
            if [[ "${release_target}" != "${GITHUB_SHA}" ]]; then
              echo "Rolling main release ${RELEASE_TAG} did not update to ${GITHUB_SHA}; found target ${release_target}." >&2
              exit 1
            fi

            if [[ "${release_is_prerelease}" != "true" ]]; then
              echo "Rolling main release ${RELEASE_TAG} must remain a prerelease." >&2
              exit 1
            fi

            if (( release_asset_count != expected_asset_count )); then
              echo "Rolling main release ${RELEASE_TAG} exposed ${release_asset_count} assets but ${expected_asset_count} were staged for publication." >&2
              exit 1
            fi
          fi

          if [[ "${RELEASE_TAG}" != "${MAIN_RELEASE_TAG}" ]] && (( release_asset_count < expected_asset_count )); then
            echo "Release ${RELEASE_TAG} exposed ${release_asset_count} assets but ${expected_asset_count} were staged for publication." >&2
            exit 1
          fi

      - name: Verify rolling main release assets are downloadable
        if: ${{ github.ref == 'refs/heads/main' }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.release_meta.outputs.tag_name }}
        run: |
          set -euo pipefail

          release_view_json="$(gh release view "${RELEASE_TAG}" --json assets)"
          mapfile -t asset_urls < <(jq -r '.assets[].url' <<<"${release_view_json}")

          if [[ "${#asset_urls[@]}" -eq 0 ]]; then
            echo "Rolling main release ${RELEASE_TAG} did not expose any downloadable assets." >&2
            exit 1
          fi

          for asset_url in "${asset_urls[@]}"; do
            curl --fail --silent --show-error --location --head "${asset_url}" >/dev/null
          done

      - name: Upload published distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: elegy-published-distribution-${{ github.sha }}
          if-no-files-found: error
          path: |
            artifacts/distribution/**
