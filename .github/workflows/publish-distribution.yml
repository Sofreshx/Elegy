name: Publish Distribution

on:
  push:
    tags:
      - v*
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: publish-distribution-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore solution
        run: dotnet restore ./Elegy.sln

      - name: Pack distributable .NET packages
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $packagesOutput = Join-Path $PWD 'artifacts/distribution/packages'
          New-Item -ItemType Directory -Path $packagesOutput -Force | Out-Null

          Get-ChildItem ./src -Recurse -Filter *.csproj |
            Sort-Object FullName |
            ForEach-Object {
              dotnet pack $_.FullName `
                --configuration Release `
                --no-restore `
                --output $packagesOutput `
                -p:ContinuousIntegrationBuild=true `
                --verbosity minimal
            }

      - name: Export contracts bundle
        shell: pwsh
        run: |
          ./scripts/export-contracts.ps1 -CreateArchive

      - name: Configure GitHub Packages source
        shell: pwsh
        run: |
          dotnet nuget add source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" `
            --name github `
            --username "${{ github.actor }}" `
            --password "${{ secrets.GITHUB_TOKEN }}" `
            --store-password-in-clear-text

      - name: Publish packages to GitHub Packages
        shell: pwsh
        run: |
          Get-ChildItem ./artifacts/distribution/packages -Filter *.nupkg |
            Where-Object { $_.Name -notlike '*.symbols.nupkg' } |
            Sort-Object Name |
            ForEach-Object {
              dotnet nuget push $_.FullName --source github --skip-duplicate
            }

      - name: Resolve release tag
        if: ${{ github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v') }}
        id: release_meta
        shell: bash
        run: |
          set -euo pipefail

          tag_name="${GITHUB_REF_NAME:-}"
          if [[ "${GITHUB_EVENT_NAME}" == "release" ]]; then
            tag_name="${{ github.event.release.tag_name }}"
          fi

          if [[ -z "${tag_name}" ]]; then
            echo "Unable to determine a release tag for published distribution assets." >&2
            exit 1
          fi

          echo "tag_name=${tag_name}" >> "$GITHUB_OUTPUT"

      - name: Attach published distribution assets to GitHub release
        if: ${{ github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v') }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.release_meta.outputs.tag_name }}
        run: |
          set -euo pipefail

          mapfile -t release_files < <(find artifacts/distribution/packages -maxdepth 1 -type f \( -name '*.nupkg' -o -name '*.snupkg' \) | sort)
          while IFS= read -r bundle; do
            release_files+=("${bundle}")
          done < <(find artifacts/distribution -maxdepth 1 -type f -name 'elegy-contracts-*.zip' | sort)

          if [[ "${#release_files[@]}" -eq 0 ]]; then
            echo "No published distribution assets were found to attach to release ${RELEASE_TAG}." >&2
            exit 1
          fi

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" "${release_files[@]}" --clobber
          else
            gh release create "${RELEASE_TAG}" "${release_files[@]}" --title "Release ${RELEASE_TAG}" --generate-notes
          fi

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: elegy-published-distribution-${{ github.sha }}
          if-no-files-found: error
          path: |
            artifacts/distribution/packages/*.nupkg
            artifacts/distribution/packages/*.snupkg
            artifacts/contracts/**
            artifacts/distribution/elegy-contracts-*.zip
