name: Publish Crate

on:
  workflow_call:
    inputs:
      crate-path:
        required: true
        type: string
        description: Path from repo root to the crate directory (e.g. rust/crates/elegy-memory)
      crate-name:
        required: true
        type: string
        description: Crate name as published on crates.io
      dry-run:
        required: false
        type: boolean
        default: false
        description: If true, runs cargo publish --dry-run without publishing
    secrets:
      cargo-registry-token:
        required: true
        description: crates.io API token (CARGO_REGISTRY_TOKEN)

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.95.0

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: rust -> rust/target

      - name: Verify crate version
        shell: bash
        working-directory: ${{ inputs.crate-path }}
        run: |
          VERSION="$(cargo metadata --format-version=1 --no-deps | jq -r '.packages[0].version')"
          echo "crate_version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Preparing to publish ${{ inputs.crate-name }} v${VERSION}"

      - name: Publish to crates.io
        if: ${{ !inputs.dry-run }}
        shell: bash
        working-directory: ${{ inputs.crate-path }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.cargo-registry-token }}
        run: |
          cargo publish

      - name: Dry-run publish
        if: ${{ inputs.dry-run }}
        shell: bash
        working-directory: ${{ inputs.crate-path }}
        run: |
          cargo publish --dry-run
