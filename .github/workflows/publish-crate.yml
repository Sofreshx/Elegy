name: Crate Verify

on:
  pull_request:
    paths:
      - 'plugins/**/Cargo.toml'
      - 'plugins/**/src/**'
      - 'shared/**/Cargo.toml'
      - 'shared/**/src/**'
      - 'tools/**/Cargo.toml'
      - 'tools/**/src/**'
      - 'hosts/**/Cargo.toml'
      - 'hosts/**/src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - '.github/workflows/publish-crate.yml'
  push:
    branches:
      - main
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      crate-path:
        description: Path from repo root to the crate directory
        required: false
        default: plugins/memory
        type: string
      crate-name:
        description: Crate name to verify
        required: false
        default: elegy-memory
        type: string

permissions:
  contents: read

concurrency:
  group: crate-verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CRATE_PATH: ${{ github.event.inputs.crate-path || 'plugins/memory' }}
  CRATE_NAME: ${{ github.event.inputs.crate-name || 'elegy-memory' }}

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dtolnay/rust-toolchain@1.96.1

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: . -> target

      - name: Verify crate manifest
        working-directory: .
        run: |
          cargo verify-project --manifest-path "${{ env.CRATE_PATH }}/Cargo.toml"
          echo "Manifest for ${{ env.CRATE_NAME }} is valid"

      - name: Run crate tests
        working-directory: .
        run: cargo test -p "${{ env.CRATE_NAME }}"

      - name: Check crate version
        id: version
        working-directory: .
        run: |
          VERSION="$(cargo metadata --format-version=1 --no-deps --manifest-path "${{ env.CRATE_PATH }}/Cargo.toml" | jq -r '.packages[0].version')"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Crate ${{ env.CRATE_NAME }} v${VERSION}"

      # Advisory readiness check. Crates keep `publish = false` by default,
      # so this normally reports the publishing block without failing CI.
      - name: cargo publish --dry-run
        working-directory: "${{ env.CRATE_PATH }}"
        continue-on-error: true
        run: cargo publish --dry-run

      # Actual publish remains dormant unless a release event, publishable
      # Cargo.toml, and CARGO_REGISTRY_TOKEN all exist.
      - name: Publish to crates.io
        if: github.event_name == 'release'
        working-directory: "${{ env.CRATE_PATH }}"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo publish
          echo "Published ${{ env.CRATE_NAME }} v${{ steps.version.outputs.version }} to crates.io"
