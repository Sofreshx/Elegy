name: Publish elegy-memory

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      dry-run:
        description: Run cargo publish --dry-run without publishing
        required: false
        type: boolean
        default: true

jobs:
  publish:
    name: Publish elegy-memory to crates.io
    uses: ./.github/workflows/publish-crate.yml
    with:
      crate-path: rust/crates/elegy-memory
      crate-name: elegy-memory
      dry-run: ${{ inputs.dry-run || false }}
    secrets:
      cargo-registry-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
