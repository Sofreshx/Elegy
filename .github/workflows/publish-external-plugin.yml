name: Publish external plugin

on:
  workflow_call:
    inputs:
      plugin_name:
        description: Exact portable plugin manifest name
        required: true
        type: string
      marketplace_eligible:
        description: Whether stable marketplace publication is currently approved
        required: true
        type: boolean
      release_tag:
        description: main-snapshot or the exact triggering semver tag
        required: true
        type: string
    secrets:
      ELEGY_RELEASE_TOKEN:
        description: Token allowed to upload external plugin assets to the Elegy release
        required: true

permissions:
  contents: read

concurrency:
  group: external-plugin-${{ inputs.plugin_name }}-${{ inputs.release_tag }}
  cancel-in-progress: false

jobs:
  package-and-publish:
    name: package (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-2022
            target: x86_64-pc-windows-msvc
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - runner: macos-15
            target: aarch64-apple-darwin
    steps:
      - name: Check out plugin source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Resolve governed workflow source
        id: governance
        shell: pwsh
        run: |
          $workflowRef = '${{ github.workflow_ref }}'
          $parts = $workflowRef -split '@', 2
          if ($parts.Count -ne 2) {
            throw "Unable to resolve reusable workflow identity: $workflowRef"
          }
          $pathMarker = '/.github/workflows/'
          $markerIndex = $parts[0].IndexOf($pathMarker, [System.StringComparison]::Ordinal)
          if ($markerIndex -lt 1) {
            throw "Unable to resolve reusable workflow repository: $workflowRef"
          }
          "repository=$($parts[0].Substring(0, $markerIndex))" >> $env:GITHUB_OUTPUT
          "ref=$($parts[1])" >> $env:GITHUB_OUTPUT

      - name: Check out governed Elegy tooling
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: ${{ steps.governance.outputs.repository }}
          ref: ${{ steps.governance.outputs.ref }}
          path: Elegy
          persist-credentials: false

      - name: Validate publication identity and eligibility
        id: policy
        shell: pwsh
        env:
          PLUGIN_NAME: ${{ inputs.plugin_name }}
          MARKETPLACE_ELIGIBLE: ${{ inputs.marketplace_eligible }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          $manifest = Get-Content '.elegy-plugin/plugin.json' -Raw | ConvertFrom-Json
          if ($manifest.name -cne $env:PLUGIN_NAME) {
            throw "Plugin manifest name '$($manifest.name)' does not match governed name '$env:PLUGIN_NAME'."
          }

          if ($env:RELEASE_TAG -eq 'main-snapshot') {
            if ('${{ github.ref }}' -cne 'refs/heads/main') {
              throw 'main-snapshot may only be refreshed by the main branch.'
            }
            "channel=integration" >> $env:GITHUB_OUTPUT
            exit 0
          }

          if ($env:RELEASE_TAG -notmatch '^v[0-9]+\.[0-9]+\.[0-9]+(?:[-+][0-9A-Za-z.-]+)?$') {
            throw "Stable publication requires an immutable semver tag, got '$env:RELEASE_TAG'."
          }
          if ($env:MARKETPLACE_ELIGIBLE -cne 'true') {
            throw 'Stable publication is blocked because marketplace eligibility is not approved.'
          }
          if ('${{ github.ref }}' -cne "refs/tags/$env:RELEASE_TAG") {
            throw 'Stable release_tag must exactly match the triggering Git tag.'
          }
          if ($manifest.version -cne $env:RELEASE_TAG.Substring(1)) {
            throw "Plugin version '$($manifest.version)' does not match '$env:RELEASE_TAG'."
          }
          "channel=stable" >> $env:GITHUB_OUTPUT

      - name: Install pinned Rust toolchain
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4
        with:
          toolchain: 1.88.0
          targets: ${{ matrix.target }}

      - name: Package plugin archive
        shell: pwsh
        run: pwsh -File scripts/package.ps1 -Target '${{ matrix.target }}' -ElegyRoot '${{ github.workspace }}/Elegy' -OutputDirectory '${{ github.workspace }}/artifacts/distribution'

      - name: Verify publication credentials and release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.ELEGY_RELEASE_TOKEN }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          CHANNEL: ${{ steps.policy.outputs.channel }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:GH_TOKEN)) {
            throw 'ELEGY_RELEASE_TOKEN is required before any publication attempt.'
          }
          gh release view $env:RELEASE_TAG --repo Sofreshx/Elegy *> $null
          if ($LASTEXITCODE -eq 0) {
            exit 0
          }
          if ($env:CHANNEL -ne 'integration') {
            throw "Stable Elegy release '$env:RELEASE_TAG' must already exist."
          }
          gh release create $env:RELEASE_TAG --repo Sofreshx/Elegy --title $env:RELEASE_TAG --notes "Rolling integration assets from ${{ github.repository }}@${{ github.sha }}" --prerelease
          if ($LASTEXITCODE -ne 0) {
            gh release view $env:RELEASE_TAG --repo Sofreshx/Elegy
          }

      - name: Refresh rolling integration assets
        if: steps.policy.outputs.channel == 'integration'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.ELEGY_RELEASE_TOKEN }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          $assets = Get-ChildItem '${{ github.workspace }}/artifacts/distribution' -File | ForEach-Object { $_.FullName }
          gh release upload $env:RELEASE_TAG --repo Sofreshx/Elegy --clobber @assets

      - name: Publish immutable stable assets
        if: steps.policy.outputs.channel == 'stable'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.ELEGY_RELEASE_TOKEN }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          $assets = Get-ChildItem '${{ github.workspace }}/artifacts/distribution' -File | ForEach-Object { $_.FullName }
          gh release upload $env:RELEASE_TAG --repo Sofreshx/Elegy @assets
