name: release-finalize

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to finalize"
        type: string
        required: true
      validate_marketplace_assets:
        description: "Validate marketplace artifact URLs for this tag"
        type: boolean
        required: false
        default: false

permissions:
  contents: write

concurrency:
  group: release-finalize-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  finalize:
    name: finalize release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Resolve release tag
        id: release_meta
        shell: bash
        run: |
          set -euo pipefail
          tag_name="${{ inputs.release_tag }}"
          if [[ -z "${tag_name}" ]]; then
            echo "No release tag resolved; aborting." >&2
            exit 1
          fi
          echo "tag_name=${tag_name}" >> "$GITHUB_OUTPUT"

      - name: Download release archives
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.release_meta.outputs.tag_name }}
        run: |
          set -euo pipefail
          mkdir -p artifacts/distribution
          gh release download "${RELEASE_TAG}" --dir artifacts/distribution --clobber

      - name: Validate marketplace release assets
        if: ${{ inputs.validate_marketplace_assets }}
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.release_meta.outputs.tag_name }}
        run: |
          set -euo pipefail
          mapfile -t expected < <(
            jq -r --arg tag "$RELEASE_TAG" '
              .plugins[].artifacts[]
              | select((.url | contains("/" + $tag + "/")) and (.checksumUrl | contains("/" + $tag + "/")))
              | (.url | split("/")[-1]), (.checksumUrl | split("/")[-1])
            ' .elegy/marketplace.json | sort -u
          )
          missing=()
          for name in "${expected[@]}"; do
            if [[ ! -f "artifacts/distribution/$name" ]]; then
              missing+=("$name")
            fi
          done
          if [[ "${#missing[@]}" -gt 0 ]]; then
            printf 'Missing marketplace release assets for %s:\n' "$RELEASE_TAG" >&2
            printf '  %s\n' "${missing[@]}" >&2
            exit 1
          fi

      - name: Compose manifest + checksums
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.release_meta.outputs.tag_name }}
        run: |
          set -euo pipefail
          bundle_version="$(jq -r '.schemaVersion' docs/schema-version.json)"
          manifest_path="artifacts/distribution/elegy-release-manifest-${RELEASE_TAG}.json"
          checksums_path="artifacts/distribution/elegy-release-checksums-${RELEASE_TAG}.json"

          mapfile -t asset_files < <(find artifacts/distribution -maxdepth 1 -type f | sort)
          if [[ "${#asset_files[@]}" -eq 0 ]]; then
            echo "Release ${RELEASE_TAG} has no downloadable assets." >&2
            exit 1
          fi

          assets_json='[]'
          published_targets_json='[]'
          for file in "${asset_files[@]}"; do
            base="$(basename "$file")"
            case "$base" in
              *.sha256|elegy-release-manifest-*.json|elegy-release-checksums-*.json)
                continue
                ;;
            esac
            size="$(stat -c%s "$file")"
            sha="$(sha256sum "$file" | awk '{print $1}')"

            if [[ "$base" =~ ^elegy-codex-marketplace-(x86_64-pc-windows-msvc|x86_64-unknown-linux-gnu|aarch64-apple-darwin)\.zip$ ]]; then
              target="${BASH_REMATCH[1]}"
              asset_entry="$(jq -nc --arg fn "$base" --arg sha "$sha" --argjson sz "$size" --arg tg "$target" '{assetKind:"codex-marketplace",surface:null,target:$tg,fileName:$fn,requiredEntries:[".agents/plugins/marketplace.json"],sizeBytes:$sz,sha256:$sha}')"
            elif [[ "$base" == "elegy-contracts-bundle.zip" ]]; then
              asset_entry="$(jq -nc --arg fn "$base" --arg sha "$sha" --argjson sz "$size" '{assetKind:"contracts-bundle",surface:null,target:null,fileName:$fn,requiredEntries:[],sizeBytes:$sz,sha256:$sha}')"
            elif [[ "$base" == elegy-installer-*.zip ]]; then
              asset_entry="$(jq -nc --arg fn "$base" --arg sha "$sha" --argjson sz "$size" '{assetKind:"installer",surface:null,target:null,fileName:$fn,requiredEntries:[],sizeBytes:$sz,sha256:$sha}')"
            elif [[ "$base" =~ ^(.+)-plugin-(any|x86_64-pc-windows-msvc|x86_64-unknown-linux-gnu|aarch64-apple-darwin)\.zip$ ]]; then
              archive_family="${BASH_REMATCH[1]}"
              target="${BASH_REMATCH[2]}"
              surface_name="$(jq -r --arg family "$archive_family" '.surfaces[] | select((.kind == "cli" or .kind == "bundled-plugin" or .kind == "skill-package" or (.kind == "external-plugin-wrapper" and (.marketplacePublished != false))) and .name == $family) | .name' distribution/surfaces.json)"
              if [[ -z "$surface_name" ]]; then
                echo "Could not resolve plugin-packaged surface for archive family: $archive_family" >&2
                exit 1
              fi
              asset_entry="$(jq -nc --arg fn "$base" --arg sha "$sha" --argjson sz "$size" --arg sf "$surface_name" --arg tg "$target" '{assetKind:"plugin-package",surface:$sf,target:$tg,fileName:$fn,requiredEntries:["plugin.json"],sizeBytes:$sz,sha256:$sha}')"
              if [[ "$target" != "any" ]]; then
                published_targets_json="$(jq -nc --argjson current "$published_targets_json" --arg target "$target" '$current + [$target] | unique')"
              fi
            elif [[ "$base" =~ ^(.+)-(x86_64-pc-windows-msvc|x86_64-unknown-linux-gnu|aarch64-apple-darwin)(\.exe)?$ ]]; then
              archive_family="${BASH_REMATCH[1]}"
              target="${BASH_REMATCH[2]}"
              surface_name="$(jq -r --arg family "$archive_family" '.surfaces[] | select((.kind == "cli" or .kind == "host-adapter") and .name == $family) | .name' distribution/surfaces.json)"
              if [[ -z "$surface_name" ]]; then
                echo "Could not resolve surface for archive family: $archive_family" >&2
                exit 1
              fi
              asset_entry="$(jq -nc --arg fn "$base" --arg sha "$sha" --argjson sz "$size" --arg sf "$surface_name" --arg tg "$target" '{assetKind:"cli",surface:$sf,target:$tg,fileName:$fn,requiredEntries:[],sizeBytes:$sz,sha256:$sha}')"
              published_targets_json="$(jq -nc --argjson current "$published_targets_json" --arg target "$target" '$current + [$target] | unique')"
            else
              echo "Unexpected release archive name: $base" >&2
              exit 1
            fi

            assets_json="$(jq -nc --argjson current "$assets_json" --argjson entry "$asset_entry" '$current + [$entry]')"
          done

          jq -nc \
            --arg repository "${GITHUB_REPOSITORY}" \
            --arg tag "${RELEASE_TAG}" \
            --arg bundleVersion "${bundle_version}" \
            --argjson publishedTargets "$published_targets_json" \
            --argjson assets "$assets_json" \
            '{
              documentType: "elegy-release-manifest",
              schemaVersion: "elegy-release-manifest/v1",
              repository: $repository,
              tag: $tag,
              bundleVersion: $bundleVersion,
              publishedTargets: $publishedTargets,
              assets: $assets
            }' > "$manifest_path"

          entries_json="$(jq -nc --argjson assets "$assets_json" '$assets | map({fileName, sizeBytes, sha256})')"
          manifest_size="$(stat -c%s "$manifest_path")"
          manifest_sha="$(sha256sum "$manifest_path" | awk '{print $1}')"
          entries_json="$(jq -nc --argjson current "$entries_json" --arg fn "$(basename "$manifest_path")" --arg sha "$manifest_sha" --argjson sz "$manifest_size" '$current + [{fileName:$fn,sizeBytes:$sz,sha256:$sha}]')"

          jq -nc \
            --arg tag "${RELEASE_TAG}" \
            --argjson entries "$entries_json" \
            '{
              documentType: "elegy-release-checksums",
              schemaVersion: "elegy-release-checksums/v1",
              tag: $tag,
              algorithm: "sha256",
              entries: $entries
            }' > "$checksums_path"

      - name: Upload manifest + checksums to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.release_meta.outputs.tag_name }}
        run: |
          set -euo pipefail
          gh release upload "${RELEASE_TAG}" \
            "artifacts/distribution/elegy-release-manifest-${RELEASE_TAG}.json" \
            "artifacts/distribution/elegy-release-checksums-${RELEASE_TAG}.json" \
            --clobber

      - name: Upload finalize artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: elegy-release-finalized-${{ steps.release_meta.outputs.tag_name }}-${{ github.sha }}
          if-no-files-found: error
          path: |
            artifacts/distribution/elegy-release-manifest-*.json
            artifacts/distribution/elegy-release-checksums-*.json
