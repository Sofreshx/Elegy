name: Publish Orchestrator

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  discover:
    name: discover CLI surfaces
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - id: discover
        shell: bash
        run: |
          set -euo pipefail
          surfaces="$(jq -c '[.surfaces[] | select(.kind == "cli" or .kind == "bundled-plugin" or .kind == "host-adapter" or .kind == "skill-package") | {surface_name: .name, surface_kind: .kind, surface_package: (.package // .name), surface_packaging: (.packaging // "flat"), plugin_root: (.pluginRoot // ""), surface_targets: (.targets // [])}]' distribution/surfaces.json)"
          targets='[{"runner":"ubuntu-24.04","target":"x86_64-unknown-linux-gnu"},{"runner":"windows-2022","target":"x86_64-pc-windows-msvc"},{"runner":"macos-15","target":"aarch64-apple-darwin"}]'
          matrix="$(jq -nc --argjson surfaces "$surfaces" --argjson targets "$targets" '[ $surfaces[] as $surface | if $surface.surface_kind == "skill-package" then $surface + {runner:"ubuntu-24.04",target:"any"} else ($targets[] as $target | select(($surface.surface_targets | length) == 0 or any($surface.surface_targets[]; . == $target.target)) | $surface + $target) end | del(.surface_targets) ]')"
          echo "matrix=${matrix}" >> "$GITHUB_OUTPUT"

  build:
    name: build (${{ matrix.surface_name }}, ${{ matrix.target }})
    needs: discover
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.discover.outputs.matrix) }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: dtolnay/rust-toolchain@1.96.1
        if: ${{ matrix.surface_kind == 'skill-package' }}

      - uses: dtolnay/rust-toolchain@1.96.1
        if: ${{ matrix.surface_kind != 'skill-package' }}
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: . -> target

      - name: cargo build --release
        if: ${{ matrix.surface_kind != 'skill-package' }}
        working-directory: .
        run: cargo build --release --target ${{ matrix.target }} -p ${{ matrix.surface_package }}

      - name: Stage archive
        id: stage
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/distribution
          ext=""
          if [[ "${{ matrix.target }}" == *windows* ]]; then
            ext=".exe"
          fi
          binary_name="${{ matrix.surface_name }}${ext}"
          binary_path="target/${{ matrix.target }}/release/${binary_name}"
          if [[ "${{ matrix.surface_kind }}" != "skill-package" && ! -f "$binary_path" ]]; then
            echo "Missing build output: $binary_path" >&2
            exit 1
          fi
          if [[ "${{ matrix.surface_packaging }}" == "plugin" ]]; then
            plugin_root="${{ matrix.plugin_root }}"
            if [[ -z "$plugin_root" ]]; then
              echo "Missing pluginRoot for plugin-packaged surface ${{ matrix.surface_name }}" >&2
              exit 1
            fi
            asset_name="${{ matrix.surface_name }}-plugin-${{ matrix.target }}.zip"
            asset_path="artifacts/distribution/${asset_name}"
            if [[ "${{ matrix.surface_kind }}" == "skill-package" ]]; then
              cargo run --quiet -p elegy-tooling --bin elegy-plugin-packaging -- \
                pack \
                --plugin "$plugin_root" \
                --output "$asset_path"
            else
              cargo run --quiet -p elegy-tooling --bin elegy-plugin-packaging -- \
                pack \
                --plugin "$plugin_root" \
                --output "$asset_path" \
                --binary "$binary_path" \
                --binary-name "bin/${binary_name}"
            fi
          else
            asset_name="${{ matrix.surface_name }}-${{ matrix.target }}${ext}"
            asset_path="artifacts/distribution/${asset_name}"
            cp "$binary_path" "$asset_path"
          fi
          sha256sum "$asset_path" | awk '{print $1}' > "${asset_path}.sha256"
          echo "asset=${asset_name}" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.surface_name }}-${{ matrix.target }}-${{ github.sha }}
          if-no-files-found: error
          path: |
            artifacts/distribution/${{ steps.stage.outputs.asset }}
            artifacts/distribution/${{ steps.stage.outputs.asset }}.sha256

  export-contracts:
    name: export contracts bundle
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: dtolnay/rust-toolchain@1.96.1

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: . -> target

      - name: Validate contracts (canonical)
        working-directory: .
        run: cargo run -p elegy-core --bin elegy-contracts -- --project . contracts validate

      - name: Export contracts bundle
        working-directory: .
        run: cargo run -p elegy-core --bin elegy-contracts -- --project . contracts export --output-dir artifacts/contracts --archive --archive-output artifacts/distribution/elegy-contracts-bundle.zip

      - name: Upload contracts distribution archive
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: elegy-contracts-${{ github.sha }}
          if-no-files-found: error
          path: artifacts/distribution/elegy-contracts-bundle.zip

  package-installer:
    name: package installer bootstrap
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Package installer archive
        shell: bash
        run: |
          set -euo pipefail
          bundle_version="$(jq -r '.schemaVersion' docs/schema-version.json)"
          staging="$(mktemp -d)"
          mkdir -p "artifacts/distribution"
          cp scripts/install-distribution.sh "$staging/install.sh"
          cp scripts/install-distribution.ps1 "$staging/install.ps1"
          cp PACKAGE_README.md "$staging/README.md"
          (cd "$staging" && zip -r "${GITHUB_WORKSPACE}/artifacts/distribution/elegy-installer-${bundle_version}.zip" .)

      - name: Upload installer distribution artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: elegy-installer-${{ github.sha }}
          if-no-files-found: error
          path: artifacts/distribution/elegy-installer-*.zip

  publish:
    name: publish to GitHub Releases
    needs:
      - build
      - export-contracts
      - package-installer
    runs-on: ubuntu-latest
    if: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: dtolnay/rust-toolchain@1.96.1

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: . -> target

      - name: Download all assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: "*-${{ github.sha }}"
          path: artifacts/distribution
          merge-multiple: true

      - name: Download published external wrapper assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF:-}" == refs/tags/v* ]]; then
            release_tag="${GITHUB_REF_NAME}"
          else
            release_tag="main-snapshot"
          fi

          mapfile -t wrapper_prefixes < <(
            jq -r '.surfaces[]
              | select(.kind == "external-plugin-wrapper" and (.marketplacePublished != false))
              | .name + "-plugin-"' distribution/surfaces.json
          )

          asset_names="$(gh release view "${release_tag}" --repo "${GITHUB_REPOSITORY}" --json assets --jq '.assets[].name')"
          for prefix in "${wrapper_prefixes[@]}"; do
            mapfile -t matches < <(printf '%s\n' "${asset_names}" | grep -E "^${prefix}.*\.zip(\.sha256)?$" || true)
            if [[ "${#matches[@]}" -eq 0 ]]; then
              echo "No published assets found for external wrapper prefix '${prefix}' in release '${release_tag}'." >&2
              exit 1
            fi
            for asset_name in "${matches[@]}"; do
              gh release download "${release_tag}" \
                --repo "${GITHUB_REPOSITORY}" \
                --pattern "${asset_name}" \
                --dir artifacts/distribution \
                --clobber
            done
          done

      - name: Generate Codex marketplace projections
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/codex artifacts/distribution
          for target in x86_64-pc-windows-msvc x86_64-unknown-linux-gnu aarch64-apple-darwin; do
            output="artifacts/codex/${target}"
            rm -rf "$output"
            cargo run --quiet -p elegy-tooling --bin elegy-plugin-packaging -- \
              marketplace export-codex \
              --source . \
              --target "$target" \
              --artifact-dir artifacts/distribution \
              --output "$output"
            asset="artifacts/distribution/elegy-codex-marketplace-${target}.zip"
            (cd "$output" && zip -qr "${GITHUB_WORKSPACE}/${asset}" .)
            sha256sum "$asset" | awk '{print $1}' > "${asset}.sha256"
          done

      - name: Resolve release tag
        id: release_meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF:-}" == refs/tags/v* ]]; then
            echo "tag_name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            echo "tag_name=main-snapshot" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Ensure release exists
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.release_meta.outputs.tag_name }}
          PRERELEASE: ${{ steps.release_meta.outputs.prerelease }}
        run: |
          set -euo pipefail
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            exit 0
          fi
          if [[ "${PRERELEASE}" == "true" ]]; then
            gh release create "${RELEASE_TAG}" --title "${RELEASE_TAG}" --prerelease --notes "Automated snapshot from ${GITHUB_REF}"
          else
            gh release create "${RELEASE_TAG}" --title "${RELEASE_TAG}" --notes "Automated release from ${GITHUB_REF}"
          fi

      - name: Compose manifest + checksums
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.release_meta.outputs.tag_name }}
        run: |
          set -euo pipefail
          mkdir -p artifacts/distribution
          bundle_version="$(jq -r '.schemaVersion' docs/schema-version.json)"
          manifest_path="artifacts/distribution/elegy-release-manifest-${RELEASE_TAG}.json"
          checksums_path="artifacts/distribution/elegy-release-checksums-${RELEASE_TAG}.json"

          mapfile -t asset_files < <(find artifacts/distribution -maxdepth 1 -type f | sort)
          if [[ "${#asset_files[@]}" -eq 0 ]]; then
            echo "No release assets were staged." >&2
            exit 1
          fi

          assets_json='[]'
          published_targets_json='[]'
          for file in "${asset_files[@]}"; do
            base="$(basename "$file")"
            case "$base" in
              *.sha256|elegy-release-manifest-*.json|elegy-release-checksums-*.json)
                continue
                ;;
            esac
            size="$(stat -c%s "$file")"
            sha="$(sha256sum "$file" | awk '{print $1}')"

            if [[ "$base" =~ ^elegy-codex-marketplace-(x86_64-pc-windows-msvc|x86_64-unknown-linux-gnu|aarch64-apple-darwin)\.zip$ ]]; then
              target="${BASH_REMATCH[1]}"
              asset_entry="$(jq -nc --arg fn "$base" --arg sha "$sha" --argjson sz "$size" --arg tg "$target" '{assetKind:"codex-marketplace",surface:null,target:$tg,fileName:$fn,requiredEntries:[".agents/plugins/marketplace.json"],sizeBytes:$sz,sha256:$sha}')"
            elif [[ "$base" == "elegy-contracts-bundle.zip" ]]; then
              asset_entry="$(jq -nc --arg fn "$base" --arg sha "$sha" --argjson sz "$size" '{assetKind:"contracts-bundle",surface:null,target:null,fileName:$fn,requiredEntries:[],sizeBytes:$sz,sha256:$sha}')"
            elif [[ "$base" == elegy-installer-*.zip ]]; then
              asset_entry="$(jq -nc --arg fn "$base" --arg sha "$sha" --argjson sz "$size" '{assetKind:"installer",surface:null,target:null,fileName:$fn,requiredEntries:[],sizeBytes:$sz,sha256:$sha}')"
            elif [[ "$base" =~ ^(.+)-plugin-(any|x86_64-pc-windows-msvc|x86_64-unknown-linux-gnu|aarch64-apple-darwin)\.zip$ ]]; then
              archive_family="${BASH_REMATCH[1]}"
              target="${BASH_REMATCH[2]}"
              surface_name="$(jq -r --arg family "$archive_family" '.surfaces[] | select((.kind == "cli" or .kind == "bundled-plugin" or .kind == "skill-package" or (.kind == "external-plugin-wrapper" and (.marketplacePublished != false))) and .name == $family) | .name' distribution/surfaces.json)"
              if [[ -z "$surface_name" ]]; then
                echo "Could not resolve plugin-packaged surface for archive family: $archive_family" >&2
                exit 1
              fi
              asset_entry="$(jq -nc --arg fn "$base" --arg sha "$sha" --argjson sz "$size" --arg sf "$surface_name" --arg tg "$target" '{assetKind:"plugin-package",surface:$sf,target:$tg,fileName:$fn,requiredEntries:["plugin.json"],sizeBytes:$sz,sha256:$sha}')"
              if [[ "$target" != "any" ]]; then
                published_targets_json="$(jq -nc --argjson current "$published_targets_json" --arg target "$target" '$current + [$target] | unique')"
              fi
            elif [[ "$base" =~ ^(.+)-(x86_64-pc-windows-msvc|x86_64-unknown-linux-gnu|aarch64-apple-darwin)(\.exe)?$ ]]; then
              archive_family="${BASH_REMATCH[1]}"
              target="${BASH_REMATCH[2]}"
              surface_name="$(jq -r --arg family "$archive_family" '.surfaces[] | select((.kind == "cli" or .kind == "host-adapter") and .name == $family) | .name' distribution/surfaces.json)"
              if [[ -z "$surface_name" ]]; then
                echo "Could not resolve surface for archive family: $archive_family" >&2
                exit 1
              fi
              asset_entry="$(jq -nc --arg fn "$base" --arg sha "$sha" --argjson sz "$size" --arg sf "$surface_name" --arg tg "$target" '{assetKind:"cli",surface:$sf,target:$tg,fileName:$fn,requiredEntries:[],sizeBytes:$sz,sha256:$sha}')"
              published_targets_json="$(jq -nc --argjson current "$published_targets_json" --arg target "$target" '$current + [$target] | unique')"
            else
              echo "Unexpected release archive name: $base" >&2
              exit 1
            fi

            assets_json="$(jq -nc --argjson current "$assets_json" --argjson entry "$asset_entry" '$current + [$entry]')"
          done

          jq -nc \
            --arg repository "${GITHUB_REPOSITORY}" \
            --arg tag "${RELEASE_TAG}" \
            --arg bundleVersion "${bundle_version}" \
            --argjson publishedTargets "$published_targets_json" \
            --argjson assets "$assets_json" \
            '{
              documentType: "elegy-release-manifest",
              schemaVersion: "elegy-release-manifest/v1",
              repository: $repository,
              tag: $tag,
              bundleVersion: $bundleVersion,
              publishedTargets: $publishedTargets,
              assets: $assets
            }' > "$manifest_path"

          entries_json="$(jq -nc --argjson assets "$assets_json" '$assets | map({fileName, sizeBytes, sha256})')"
          manifest_size="$(stat -c%s "$manifest_path")"
          manifest_sha="$(sha256sum "$manifest_path" | awk '{print $1}')"
          entries_json="$(jq -nc --argjson current "$entries_json" --arg fn "$(basename "$manifest_path")" --arg sha "$manifest_sha" --argjson sz "$manifest_size" '$current + [{fileName:$fn,sizeBytes:$sz,sha256:$sha}]')"

          jq -nc \
            --arg tag "${RELEASE_TAG}" \
            --argjson entries "$entries_json" \
            '{
              documentType: "elegy-release-checksums",
              schemaVersion: "elegy-release-checksums/v1",
              tag: $tag,
              algorithm: "sha256",
              entries: $entries
            }' > "$checksums_path"

      - name: Upload release assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.release_meta.outputs.tag_name }}
        run: |
          set -euo pipefail
          release_id="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}" --jq '.id')"
          mapfile -t external_plugin_prefixes < <(
            jq -r '.surfaces[] | select(.kind == "external-plugin-wrapper" and (.marketplacePublished != false)) | .name + "-plugin-"' distribution/surfaces.json
          )
          while IFS=$'\t' read -r asset_id asset_name; do
            preserve_external=false
            for prefix in "${external_plugin_prefixes[@]}"; do
              if [[ "$asset_name" == "${prefix}"* ]]; then
                preserve_external=true
                break
              fi
            done
            if [[ "$preserve_external" == "true" ]]; then
              continue
            fi
            case "$asset_name" in
              *.zip|*.sha256|elegy-release-manifest-*.json|elegy-release-checksums-*.json|elegy-*-x86_64-unknown-linux-gnu|elegy-*-aarch64-apple-darwin|elegy-*-x86_64-pc-windows-msvc.exe)
                gh api --method DELETE "repos/${GITHUB_REPOSITORY}/releases/assets/${asset_id}"
                ;;
            esac
          done < <(
            gh api --paginate \
              "repos/${GITHUB_REPOSITORY}/releases/${release_id}/assets?per_page=100" \
              --jq '.[] | [.id, .name] | @tsv'
          )
          mapfile -t assets < <(find artifacts/distribution -maxdepth 1 -type f \( -name '*.zip' -o -name '*.sha256' -o -name 'elegy-*-x86_64-unknown-linux-gnu' -o -name 'elegy-*-aarch64-apple-darwin' -o -name 'elegy-*-x86_64-pc-windows-msvc.exe' -o -name 'elegy-release-*.json' \) | sort)
          gh release upload "${RELEASE_TAG}" "${assets[@]}" --clobber

      - name: Validate marketplace release assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.release_meta.outputs.tag_name }}
        run: |
          set -euo pipefail
          mapfile -t expected < <(
            jq -r --arg tag "$RELEASE_TAG" '
              .plugins[].artifacts[]
              | select((.url | contains("/" + $tag + "/")) and (.checksumUrl | contains("/" + $tag + "/")))
              | (.url | split("/")[-1]), (.checksumUrl | split("/")[-1])
            ' .elegy/marketplace.json | sort -u
          )
          mapfile -t actual < <(
            gh release view "$RELEASE_TAG" --json assets --jq '.assets[].name' | sort -u
          )
          missing=()
          for name in "${expected[@]}"; do
            if ! printf '%s\n' "${actual[@]}" | grep -Fxq "$name"; then
              missing+=("$name")
            fi
          done
          if [[ "${#missing[@]}" -gt 0 ]]; then
            printf 'Missing marketplace release assets for %s:\n' "$RELEASE_TAG" >&2
            printf '  %s\n' "${missing[@]}" >&2
            exit 1
          fi
