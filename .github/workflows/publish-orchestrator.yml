name: Publish Orchestrator
on:
  workflow_dispatch:
  push:
    tags: ['v*']
jobs:
  discover-surfaces:
    runs-on: ubuntu-latest
    outputs:
      surfaces: ${{ steps.discover.outputs.surfaces }}
    steps:
      - uses: actions/checkout@v4
      - id: discover
        run: |
          SURFACES=$(jq -c '.surfaces' distribution/surfaces.json)
          echo "surfaces=$SURFACES" >> $GITHUB_OUTPUT
  build:
    needs: discover-surfaces
    runs-on: ubuntu-latest
    strategy:
      matrix:
        surface: ${{ fromJson(needs.discover-surfaces.outputs.surfaces) }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build
        if: matrix.surface.kind == 'cli'
        run: cargo build -p ${{ matrix.surface.crate }} --release
      - name: Test
        if: matrix.surface.kind == 'cli'
        run: cargo test -p ${{ matrix.surface.crate }}
