name: Versioning Governance

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: versioning-governance-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-versioning:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Validate SemVer and schema governance
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $semver = '^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)(?:-[0-9A-Za-z-]+(?:\.[0-9A-Za-z-]+)*)?(?:\+[0-9A-Za-z-]+(?:\.[0-9A-Za-z-]+)*)?$'

          function Get-Major([string]$version) {
            return [int]($version.Split('-',2)[0].Split('+',2)[0].Split('.')[0])
          }

          if (-not (Test-Path 'governance/version-policy.json')) {
            throw 'governance/version-policy.json was not found.'
          }

          $versionPolicy = Get-Content -Raw -Path 'governance/version-policy.json' | ConvertFrom-Json
          $bundleVersion = [string]$versionPolicy.bundleVersion
          $packageVersion = [string]$versionPolicy.manifestPackage.version
          $packageName = [string]$versionPolicy.manifestPackage.name

          if ([string]::IsNullOrWhiteSpace($bundleVersion) -or $bundleVersion -notmatch $semver) {
            throw "bundleVersion '$bundleVersion' is not valid SemVer."
          }

          if ([string]::IsNullOrWhiteSpace($packageVersion) -or $packageVersion -notmatch $semver) {
            throw "manifestPackage.version '$packageVersion' is not valid SemVer."
          }

          if ([string]::IsNullOrWhiteSpace($packageName)) {
            throw 'manifestPackage.name must be defined in governance/version-policy.json.'
          }

          Write-Host "Bundle version is valid: $bundleVersion"
          Write-Host "Manifest package version is valid: $packageVersion"

          if (-not (Test-Path 'schemas/schema-version.json')) {
            throw 'schemas/schema-version.json is required.'
          }

          $schema = Get-Content -Raw -Path 'schemas/schema-version.json' | ConvertFrom-Json
          $schemaVersion = [string]$schema.schemaVersion
          if ([string]::IsNullOrWhiteSpace($schemaVersion) -or $schemaVersion -notmatch $semver) {
            throw "schemaVersion '$schemaVersion' is not valid SemVer."
          }
          Write-Host "Schema version is valid: $schemaVersion"

          if ([string]$versionPolicy.schemaVersion -ne $schemaVersion) {
            throw "governance/version-policy.json schemaVersion '$($versionPolicy.schemaVersion)' does not match schemas/schema-version.json '$schemaVersion'."
          }

          $hasParent = $true
          try {
            git rev-parse --verify HEAD^ | Out-Null
          } catch {
            $hasParent = $false
          }

          if ($hasParent) {
            $baseVersionPolicyText = git show HEAD^:governance/version-policy.json 2>$null
            $baseSchemaText = git show HEAD^:schemas/schema-version.json 2>$null

            if ($LASTEXITCODE -eq 0 -and $baseVersionPolicyText -and $baseSchemaText) {
              $baseVersionPolicy = $baseVersionPolicyText | ConvertFrom-Json
              $baseBundleVersion = [string]$baseVersionPolicy.bundleVersion
              $baseSchema = $baseSchemaText | ConvertFrom-Json
              $baseSchemaVersion = [string]$baseSchema.schemaVersion

              if ($baseBundleVersion -match $semver -and $baseSchemaVersion -match $semver) {
                $schemaMajorIncreased = (Get-Major $schemaVersion) -gt (Get-Major $baseSchemaVersion)
                $bundleMajorIncreased = (Get-Major $bundleVersion) -gt (Get-Major $baseBundleVersion)
                if ($schemaMajorIncreased -and -not $bundleMajorIncreased) {
                  throw "Schema major changed ($baseSchemaVersion -> $schemaVersion) without bundle major bump ($baseBundleVersion -> $bundleVersion)."
                }
              }
            }
          }

          Write-Host 'Versioning governance checks passed.'
