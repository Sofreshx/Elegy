name: Rust CI

on:
  pull_request:
    paths:
      - 'plugins/**'
      - 'tools/**'
      - 'skills/**'
      - 'shared/**'
      - 'hosts/**'
      - 'marketplace-wrappers/**'
      - 'distribution/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - 'rustfmt.toml'
      - 'deny.toml'
      - '.cargo/**'
      - '.github/workflows/rust-ci.yml'
      - 'scripts/**'
      - '.elegy/docs.yaml'
      - 'docs/adr/**'
      - 'docs/specs/**'
      - 'docs/docs-index.md'
      - 'plugins/**/schemas/**'
      - 'plugins/**/fixtures/**'
      - 'plugins/**/templates/**'
      - 'shared/core/fixtures/**'
      - 'docs/schema-version.json'
      - 'docs/governance/**'
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: rust-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: dtolnay/rust-toolchain@1.96.1
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: . -> target
      - name: cargo fmt --all --check
        working-directory: .
        run: cargo fmt --all --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: dtolnay/rust-toolchain@1.96.1
        with:
          components: clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: . -> target
      - name: cargo clippy --workspace --all-features -- -D warnings
        working-directory: .
        run: cargo clippy --workspace --all-features -- -D warnings

  msrv:
    name: msrv check (Rust 1.88)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: dtolnay/rust-toolchain@1.88.0
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: . -> target
      - name: cargo build --workspace
        working-directory: .
        run: cargo build --workspace

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: dtolnay/rust-toolchain@1.96.1
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: . -> target
      - name: cargo test --workspace --all-targets --all-features
        working-directory: .
        run: cargo test --workspace --all-targets --all-features --target ${{ matrix.target }}

  packaging-smoke:
    name: packaging smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: dtolnay/rust-toolchain@1.96.1
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: . -> target
      - name: verify repo shape
        shell: pwsh
        working-directory: .
        run: ./scripts/check-repo-shape.ps1 -Project . -FailOnIssues
      - name: verify declared plugin packages
        shell: pwsh
        working-directory: .
        run: |
          $surfaces = (Get-Content distribution/surfaces.json -Raw | ConvertFrom-Json).surfaces
          $pluginRoots = @($surfaces | Where-Object { $_.packaging -eq "plugin" -and $_.pluginRoot } | ForEach-Object { $_.pluginRoot })
          foreach ($pluginRoot in $pluginRoots) {
            cargo run -p elegy-tooling --bin elegy-plugin-packaging -- verify --plugin $pluginRoot
            if ($LASTEXITCODE -ne 0) {
              throw "Plugin package verification failed for $pluginRoot"
            }
          }
      - name: verify marketplace schemas and generated index
        working-directory: .
        run: |
          cargo run -p elegy-plugin-sdk --bin elegy-plugin-schemas -- --check
          cargo run -p elegy-tooling --bin elegy-plugin-packaging -- marketplace generate --project . --check
          cargo run -p elegy-tooling --bin elegy-plugin-packaging -- marketplace validate --source .
      - name: verify Codex marketplace projections
        shell: bash
        working-directory: .
        run: |
          set -euo pipefail
          for target in x86_64-pc-windows-msvc x86_64-unknown-linux-gnu aarch64-apple-darwin; do
            output="$(mktemp -u)"
            cargo run -p elegy-tooling --bin elegy-plugin-packaging -- \
              marketplace export-codex \
              --source . \
              --target "$target" \
              --output "$output"
            cargo run -p elegy-tooling --bin elegy-plugin-packaging -- \
              marketplace export-codex \
              --source . \
              --target "$target" \
              --output "$output" \
              --check
            rm -rf "$output"
          done

  docs-check-v2:
    name: docs check v2 (authoritative)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: dtolnay/rust-toolchain@1.96.1
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: . -> target
      - name: cargo run -p elegy-documentation -- check
        working-directory: .
        run: cargo run -p elegy-documentation -- check --project .
