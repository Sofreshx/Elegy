name: Rust CI

on:
  pull_request:
    paths:
      - 'plugins/**'
      - 'shared/**'
      - 'hosts/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - 'rustfmt.toml'
      - 'deny.toml'
      - '.cargo/**'
      - '.github/workflows/rust-ci.yml'
      - 'scripts/**'
      - '.elegy/docs.yaml'
      - 'docs/adr/**'
      - 'docs/specs/**'
      - 'docs/docs-index.md'
      - 'plugins/**/schemas/**'
      - 'plugins/**/fixtures/**'
      - 'plugins/**/templates/**'
      - 'shared/core/fixtures/**'
      - 'docs/schema-version.json'
      - 'docs/governance/**'
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: rust-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@1.96.1
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: . -> target
      - name: cargo fmt --all --check
        working-directory: .
        run: cargo fmt --all --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@1.96.1
        with:
          components: clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: . -> target
      - name: cargo clippy --workspace --all-features -- -D warnings
        working-directory: .
        run: cargo clippy --workspace --all-features -- -D warnings

  msrv:
    name: msrv check (Rust 1.88)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@1.88.0
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: . -> target
      - name: cargo build --workspace
        working-directory: .
        run: cargo build --workspace

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@1.96.1
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: . -> target
      - name: cargo test --workspace --all-targets --all-features
        working-directory: .
        run: cargo test --workspace --all-targets --all-features --target ${{ matrix.target }}

  packaging-smoke:
    name: packaging smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@1.96.1
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: . -> target
      - name: verify planning plugin packaging CLI
        working-directory: .
        run: cargo run -p elegy-tooling --bin elegy-plugin-packaging -- verify --plugin plugins/planning
      - name: verify marketplace schemas and generated index
        working-directory: .
        run: |
          cargo run -p elegy-plugin-sdk --bin elegy-plugin-schemas -- --check
          cargo run -p elegy-tooling --bin elegy-plugin-packaging -- marketplace generate --project . --check
          cargo run -p elegy-tooling --bin elegy-plugin-packaging -- marketplace validate --source .

  docs-check-v2:
    name: docs check v2 (authoritative)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@1.96.1
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: . -> target
      - name: cargo run -p elegy-documentation -- check
        working-directory: .
        run: cargo run -p elegy-documentation -- check --project .
