name: Rust CI

on:
  pull_request:
    paths:
      - 'rust/**'
      - '.github/workflows/rust-ci.yml'
      - '.elegy/docs.yaml'
      - 'docs/adr/**'
      - 'docs/specs/**'
      - 'docs/docs-index.md'
      - 'contracts/**'
      - 'governance/**'
      - 'schemas/**'
      - 'policies/**'
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: rust-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: rust -> rust/target
      - name: cargo fmt --all --check
        working-directory: ./rust
        run: cargo fmt --all --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: rust -> rust/target
      - name: cargo clippy --workspace --all-targets --all-features -- -D warnings
        working-directory: ./rust
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  msrv:
    name: msrv check (Rust 1.88)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: dtolnay/rust-toolchain@1.88.0
      - uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: rust -> rust/target
      - name: cargo build --workspace
        working-directory: ./rust
        run: cargo build --workspace

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: rust -> rust/target
      - name: cargo test --workspace --all-targets --all-features
        working-directory: ./rust
        run: cargo test --workspace --all-targets --all-features

  docs-check:
    name: docs check (advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: rust -> rust/target
      - name: cargo run -p elegy-cli -- docs check --json
        working-directory: ./rust
        run: cargo run -p elegy-cli -- --project .. docs check --json

  docs-check-v2:
    name: docs check v2 (authoritative)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: rust -> rust/target
      - name: cargo run -p elegy-documentation -- check
        working-directory: ./rust
        run: cargo run -p elegy-documentation -- --project .. check
