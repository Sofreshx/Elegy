name: Repo Boundaries (package-boundaries compatibility name)

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: package-boundaries-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-package-boundaries:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.96.0

      - name: Validate repo boundary policy
        shell: pwsh
        run: |
          ./scripts/validate-package-boundaries.ps1

      - name: Export contracts artifacts
        shell: pwsh
        run: |
          ./scripts/export-contracts.ps1

      - name: Validate canonical outputs
        shell: pwsh
        run: |
          ./scripts/validate-canonical-outputs.ps1 -RequireGeneratedOutputs
