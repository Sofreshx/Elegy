name: Repo Boundaries

# Validates that the contract bundle is internally consistent and that the
# Rust workspace + docs surface still agree with the governed artifacts.
# The `elegy-contracts contracts validate` step is backed by `shared/core/tests/bootstrap_slice.rs`
# and per-plugin conformance tests under `plugins/*/tests/conformance.rs`.

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: repo-boundaries-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contracts-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.96.0

      - name: Cache Rust build
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: . -> target

      - name: Validate contracts (canonical)
        working-directory: .
        run: cargo run -p elegy-core --bin elegy-contracts -- --project . contracts validate

      - name: Validate repo shape
        shell: pwsh
        working-directory: .
        run: ./scripts/check-repo-shape.ps1 -Project . -FailOnIssues

      - name: Validate contracts (conformance)
        working-directory: .
        run: cargo test -p elegy-mcp --test conformance -p elegy-configuration --test conformance -p elegy-memory --test conformance -- --nocapture
