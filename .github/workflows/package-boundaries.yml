name: Package Boundaries

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: package-boundaries-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-package-boundaries:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Validate source package boundaries
        shell: pwsh
        run: |
          ./scripts/validate-package-boundaries.ps1

      - name: Export contracts artifacts
        shell: pwsh
        run: |
          ./scripts/export-contracts.ps1

      - name: Run architecture governance tests
        run: dotnet test ./tests/Elegy.Formalization.Core.Tests/Elegy.Formalization.Core.Tests.csproj -v minimal