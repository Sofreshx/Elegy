name: Zero-dotnet Baseline Guard (dotnet-exit-freeze compatibility name)

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-dotnet-exit-freeze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Validate zero-dotnet baseline guard
        shell: pwsh
        run: |
          ./scripts/validate-dotnet-exit-freeze.ps1
