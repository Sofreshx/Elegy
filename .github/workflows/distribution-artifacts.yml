name: Distribution Artifacts

# Slimmed: each per-feature publish workflow now owns its own build/package/
# upload steps via ./.github/workflows/_reusable-publish.yml. This workflow
# only handles the two aggregate artifacts that are still centralized:
#   - the contracts bundle (governed schemas, fixtures, compatibility metadata)
#   - the installer bootstrap archive (install-distribution.sh + .ps1 shim + README)
# Release manifest + checksums are computed by ./.github/workflows/release-finalize.yml
# on release events, not here. Per-feature CLI/wrapper archives are no longer
# built in this workflow.

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: distribution-artifacts-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  export-contracts:
    name: export contracts bundle
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.96.0

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: rust -> rust/target

      - name: Validate contracts (canonical)
        working-directory: ./rust
        run: cargo run -p elegy-cli -- contracts validate --project ..

      - name: Export contracts bundle
        working-directory: ./rust
        run: cargo run -p elegy-cli -- contracts export --output ../artifacts/contracts --create-archive --archive-output ../artifacts/distribution/elegy-contracts-bundle.zip

      - name: Upload contracts distribution archive
        uses: actions/upload-artifact@v7.0.1
        with:
          name: elegy-contracts-${{ github.sha }}
          if-no-files-found: error
          path: |
            artifacts/distribution/elegy-contracts-*.zip

  package-installer:
    name: package installer bootstrap
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Package installer archive
        shell: bash
        run: |
          set -euo pipefail
          bundle_version=$(jq -r '.contractBundleVersion' contracts/schemas/schema-version.json 2>/dev/null || echo "0.0.0")
          staging=$(mktemp -d)
          mkdir -p "artifacts/distribution"
          cp scripts/install-distribution.sh "$staging/install.sh"
          cp scripts/install-distribution.ps1 "$staging/install.ps1"
          cp PACKAGE_README.md "$staging/README.md"
          (cd "$staging" && zip -r "../../artifacts/distribution/elegy-installer-${bundle_version}.zip" .)

      - name: Upload installer distribution artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: elegy-installer-${{ github.sha }}
          if-no-files-found: error
          path: |
            artifacts/distribution/elegy-installer-*.zip
