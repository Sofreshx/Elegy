name: Distribution Artifacts

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: distribution-artifacts-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pack-and-export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore solution
        run: dotnet restore ./Elegy.sln

      - name: Pack distributable .NET packages
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $packagesOutput = Join-Path $PWD 'artifacts/distribution/packages'
          New-Item -ItemType Directory -Path $packagesOutput -Force | Out-Null

          Get-ChildItem ./src -Recurse -Filter *.csproj |
            Sort-Object FullName |
            ForEach-Object {
              dotnet pack $_.FullName `
                --configuration Release `
                --no-restore `
                --output $packagesOutput `
                -p:ContinuousIntegrationBuild=true `
                --verbosity minimal
            }

      - name: Export contracts bundle
        shell: pwsh
        run: |
          ./scripts/export-contracts.ps1 -CreateArchive

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: elegy-distribution-${{ github.sha }}
          if-no-files-found: error
          path: |
            artifacts/distribution/packages/*.nupkg
            artifacts/distribution/packages/*.snupkg
            artifacts/contracts/**
            artifacts/distribution/elegy-contracts-*.zip
