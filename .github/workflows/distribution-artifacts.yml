name: Distribution Artifacts

# Pull-request validation for the two aggregate distribution artifacts:
#   - the contracts bundle (governed schemas, fixtures, compatibility metadata)
#   - the installer bootstrap archive (install-distribution.sh + .ps1 shim + README)
# Publish Orchestrator builds the complete release asset set on main and tags.

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: distribution-artifacts-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  export-contracts:
    name: export contracts bundle
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.96.1

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: . -> target

      - name: Validate contracts (canonical)
        working-directory: .
        run: cargo run -p elegy-core --bin elegy-contracts -- --project . contracts validate

      - name: Export contracts bundle
        working-directory: .
        run: cargo run -p elegy-core --bin elegy-contracts -- --project . contracts export --output-dir artifacts/contracts --archive --archive-output artifacts/distribution/elegy-contracts-bundle.zip

      - name: Upload contracts distribution archive
        uses: actions/upload-artifact@v7.0.1
        with:
          name: elegy-contracts-${{ github.sha }}
          if-no-files-found: error
          path: |
            artifacts/distribution/elegy-contracts-bundle.zip

  package-installer:
    name: package installer bootstrap
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Package installer archive
        shell: bash
        run: |
          set -euo pipefail
          bundle_version=$(jq -r '.schemaVersion' docs/schema-version.json 2>/dev/null || echo "0.0.0")
          staging=$(mktemp -d)
          mkdir -p "artifacts/distribution"
          cp scripts/install-distribution.sh "$staging/install.sh"
          cp scripts/install-distribution.ps1 "$staging/install.ps1"
          cp PACKAGE_README.md "$staging/README.md"
          (cd "$staging" && zip -r "${GITHUB_WORKSPACE}/artifacts/distribution/elegy-installer-${bundle_version}.zip" .)

      - name: Upload installer distribution artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: elegy-installer-${{ github.sha }}
          if-no-files-found: error
          path: |
            artifacts/distribution/elegy-installer-*.zip
