name: Distribution Artifacts

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: distribution-artifacts-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  export-contracts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0

      - name: Validate canonical authority inventory
        shell: pwsh
        run: |
          ./scripts/validate-canonical-outputs.ps1

      - name: Export contracts bundle
        shell: pwsh
        run: |
          ./scripts/export-contracts.ps1 -CreateArchive

      - name: Validate exported contracts bundle
        shell: pwsh
        run: |
          ./scripts/validate-canonical-outputs.ps1 -RequireGeneratedOutputs -RequireArchive

      - name: Upload exported contracts artifacts
        uses: actions/upload-artifact@v4
        with:
          name: elegy-contracts-artifacts-${{ github.sha }}
          if-no-files-found: error
          path: |
            artifacts/contracts/**

      - name: Upload contracts distribution archive
        uses: actions/upload-artifact@v4
        with:
          name: elegy-contracts-${{ github.sha }}
          if-no-files-found: error
          path: |
            artifacts/distribution/elegy-contracts-*.zip

  package-cli:
    name: package cli (${{ matrix.surface }}, ${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            surface: elegy-cli
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            surface: elegy-memory
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            surface: elegy-mcp
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            surface: elegy-planning
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            surface: elegy-skills
          - runner: windows-2022
            target: x86_64-pc-windows-msvc
            surface: elegy-cli
          - runner: windows-2022
            target: x86_64-pc-windows-msvc
            surface: elegy-memory
          - runner: windows-2022
            target: x86_64-pc-windows-msvc
            surface: elegy-mcp
          - runner: windows-2022
            target: x86_64-pc-windows-msvc
            surface: elegy-planning
          - runner: windows-2022
            target: x86_64-pc-windows-msvc
            surface: elegy-skills
          - runner: macos-14
            target: aarch64-apple-darwin
            surface: elegy-cli
          - runner: macos-14
            target: aarch64-apple-darwin
            surface: elegy-memory
          - runner: macos-14
            target: aarch64-apple-darwin
            surface: elegy-mcp
          - runner: macos-14
            target: aarch64-apple-darwin
            surface: elegy-planning
          - runner: macos-14
            target: aarch64-apple-darwin
            surface: elegy-skills
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> rust/target

      - name: Package CLI archive
        shell: pwsh
        run: |
          ./scripts/package-cli.ps1 -Surface '${{ matrix.surface }}' -Target '${{ matrix.target }}'

      - name: Upload CLI distribution artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.surface }}-${{ matrix.target }}-${{ github.sha }}
          if-no-files-found: error
          path: |
            artifacts/distribution/${{ matrix.surface }}-*.zip

  package-wrapper-surfaces:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Package wrapper archives
        shell: pwsh
        run: |
          ./scripts/package-wrapper-surface.ps1 -Surface elegy-memory,elegy-mcp,elegy-skills

      - name: Validate wrapper archives
        shell: pwsh
        run: |
          ./scripts/validate-canonical-outputs.ps1 -RequireWrapperArchives

      - name: Upload wrapper distribution artifact
        uses: actions/upload-artifact@v4
        with:
          name: elegy-wrapper-surfaces-${{ github.sha }}
          if-no-files-found: error
          path: |
            artifacts/distribution/elegy-memory-wrapper-*.zip
            artifacts/distribution/elegy-mcp-wrapper-*.zip
            artifacts/distribution/elegy-skills-wrapper-*.zip

  package-installer:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Package installer archive
        shell: pwsh
        run: |
          ./scripts/package-installer.ps1

      - name: Validate installer archive
        shell: pwsh
        run: |
          ./scripts/validate-canonical-outputs.ps1 -RequireInstallerArchives

      - name: Upload installer distribution artifact
        uses: actions/upload-artifact@v4
        with:
          name: elegy-installer-${{ github.sha }}
          if-no-files-found: error
          path: |
            artifacts/distribution/elegy-installer-*.zip

  compose-release-metadata:
    runs-on: ubuntu-latest
    needs:
      - export-contracts
      - package-cli
      - package-wrapper-surfaces
      - package-installer
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare distribution staging directory
        shell: pwsh
        run: |
          if (Test-Path ./artifacts/distribution) {
            Remove-Item ./artifacts/distribution -Recurse -Force
          }

          New-Item -ItemType Directory -Path ./artifacts/distribution | Out-Null

      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: elegy-*-${{ github.sha }}
          merge-multiple: true
          path: artifacts/distribution

      - name: Write release metadata
        shell: pwsh
        run: |
          ./scripts/write-distribution-manifest.ps1 -OutputDirectory ./artifacts/distribution -Tag local-artifacts

      - name: Validate composed distribution artifacts
        shell: pwsh
        run: |
          ./scripts/validate-canonical-outputs.ps1 -RequireArchive -RequireWrapperArchives -RequireInstallerArchives -RequireReleaseMetadata -DistributionDirectory ./artifacts/distribution

      - name: Upload release metadata artifact
        uses: actions/upload-artifact@v4
        with:
          name: elegy-release-metadata-${{ github.sha }}
          if-no-files-found: error
          path: |
            artifacts/distribution/elegy-release-manifest-*.json
            artifacts/distribution/elegy-release-checksums-*.json
