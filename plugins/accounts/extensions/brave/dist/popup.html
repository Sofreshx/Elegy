<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Elegy Accounts</title>
    <style>
      :root { font-family: Inter, ui-sans-serif, system-ui, sans-serif; color: #111827; background: #fff; }
      body { width: 320px; margin: 0; padding: 22px; }
      .mark { width: 32px; height: 32px; display: grid; place-items: center; border-radius: 9px; color: #fff; background: #2563eb; font-weight: 700; }
      h1 { margin: 18px 0 8px; font-size: 19px; line-height: 1.3; }
      p { margin: 0 0 20px; color: #526079; font-size: 14px; line-height: 1.5; }
      button { width: 100%; border: 0; border-radius: 8px; padding: 11px 16px; color: white; background: #2563eb; font: 600 14px/20px inherit; cursor: pointer; }
      button:disabled { background: #9aa7ba; cursor: default; }
      button:focus-visible { outline: 3px solid #93b4ff; outline-offset: 2px; }
    </style>
  </head>
  <body>
    <div class="mark" aria-hidden="true">E</div>
    <h1 data-title>Checking this page…</h1>
    <p data-detail>Looking for a supported account provider.</p>
    <button type="button" data-allow>Allow</button>
    <script type="module" src="popup.js"></script>
  </body>
</html>
