# Template: Phase Gate
# A goal decomposed into milestones with review-point gates between phases.
# Replace all <PLACEHOLDERS> with your specific values.
scope: "<SCOPE>"
nodes:
  - id: <GOAL_ID>
    kind: goal
    title: "<GOAL_TITLE>"
    summary: "<WHAT_SUCCESS_LOOKS_LIKE>"
    status: active
    decomposesTo: [<MS1_ID>, <MS2_ID>, <MS3_ID>]

  - id: <MS1_ID>
    kind: milestone
    title: "Phase 1: <PHASE_NAME>"
    summary: "<PHASE_1_DELIVERABLES>"
    status: proposed

  - id: <MS2_ID>
    kind: milestone
    title: "Phase 2: <PHASE_NAME>"
    summary: "<PHASE_2_DELIVERABLES>"
    status: draft

  - id: <MS3_ID>
    kind: milestone
    title: "Phase 3: <PHASE_NAME>"
    summary: "<PHASE_3_DELIVERABLES>"
    status: draft

  - id: <GATE_1_ID>
    kind: review
    title: "Gate 1: <GATE_CRITERIA>"
    summary: "Review: does phase 1 meet acceptance criteria?"
    status: active

  - id: <GATE_2_ID>
    kind: review
    title: "Gate 2: <GATE_CRITERIA>"
    summary: "Review: does phase 2 meet acceptance criteria?"
    status: active

  - id: <AC_ID>
    kind: acceptance
    title: "<ACCEPTANCE_CRITERIA>"
    summary: "<HOW_WE_KNOW_ITS_DONE>"
    status: active
    acceptanceKind: abstract
    description: "<DETAILED_ACCEPTANCE_CRITERIA>"
    verificationPolicy: manual-review

edges:
  - id: <MSGATE1_ID>
    kind: depends-on
    sourceNodeId: <MS2_ID>
    targetNodeId: <GATE_1_ID>
    status: active
  - id: <MSGATE2_ID>
    kind: depends-on
    sourceNodeId: <MS3_ID>
    targetNodeId: <GATE_2_ID>
    status: active
  - id: <GATEREQ_ID>
    kind: requires
    sourceNodeId: <GATE_1_ID>
    targetNodeId: <AC_ID>
    status: active
