# Template: Research Decision
# Captures a research spike: question, findings, decision, and action items.
# Replace all <PLACEHOLDERS> with your specific values.
scope: "<SCOPE>"
nodes:
  - id: <INSIGHT_ID>
    kind: insight
    title: "Research: <TOPIC>"
    summary: "<QUESTION_WE_NEED_ANSWERED>"
    status: active

  - id: <FINDING_1_ID>
    kind: insight
    title: "Finding: <KEY_FINDING>"
    summary: "<WHAT_WE_DISCOVERED>"
    status: active

  - id: <FINDING_2_ID>
    kind: insight
    title: "Finding: <KEY_FINDING>"
    summary: "<WHAT_WE_DISCOVERED>"
    status: active

  - id: <DECISION_ID>
    kind: insight
    title: "Decision: <WHAT_WE_DECIDED>"
    summary: "<RATIONALE_AND_TRADEOFFS>"
    status: active

  - id: <FOLLOWUP_WORK_ID>
    kind: work
    title: "<ACTION_FROM_DECISION>"
    summary: "<CONCRETE_WORK_ITEM>"
    status: proposed

edges:
  - id: <ED_DECOM_1>
    kind: decomposes-to
    sourceNodeId: <INSIGHT_ID>
    targetNodeId: <FINDING_1_ID>
    status: active
  - id: <ED_DECOM_2>
    kind: decomposes-to
    sourceNodeId: <INSIGHT_ID>
    targetNodeId: <FINDING_2_ID>
    status: active
  - id: <ED_DECOM_3>
    kind: decomposes-to
    sourceNodeId: <INSIGHT_ID>
    targetNodeId: <DECISION_ID>
    status: active
  - id: <ED_ADDR>
    kind: addressed-by
    sourceNodeId: <DECISION_ID>
    targetNodeId: <FOLLOWUP_WORK_ID>
    status: active
