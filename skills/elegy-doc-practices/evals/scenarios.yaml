- id: needs-docs-adr
  prompt: "We need a shared rule for where cross-repo architecture decisions live."
  expectedNeedsDocs: true
  expectedDocType: adr
  expectedPlacement: central-elegy
  expectedBlockCi: false

- id: needs-docs-spec
  prompt: "Add `elegy docs check` with filename, metadata, and broken-link validation."
  expectedNeedsDocs: true
  expectedDocType: spec
  expectedPlacement: central-elegy
  expectedBlockCi: false

- id: local-product-spec
  prompt: "Document holon's new sync reconciliation behavior before implementation."
  expectedNeedsDocs: true
  expectedDocType: spec
  expectedPlacement: local-repo
  expectedBlockCi: false

- id: update-existing-adr
  prompt: "We already have an ADR for docs enforcement. Mark it superseded after changing CI from blocking quality review to objective checks only."
  expectedNeedsDocs: true
  expectedDocAction: update-existing
  expectedDocType: adr
  expectedPlacement: central-elegy
  expectedBlockCi: false

- id: note-not-adr
  prompt: "Capture a short migration note for a one-off branch cleanup step."
  expectedNeedsDocs: true
  expectedDocType: note
  expectedPlacement: local-repo
  expectedBlockCi: false

- id: no-heavy-doc
  prompt: "Rename one internal helper function without changing behavior."
  expectedNeedsDocs: false
  expectedDocType: none
  expectedPlacement: none
  expectedBlockCi: false

- id: ci-objective-only
  prompt: "The ADR file is missing `owner` and has a broken relative link. Should CI block?"
  expectedNeedsDocs: true
  expectedDocType: adr
  expectedPlacement: local-repo
  expectedBlockCi: true
  expectedBlockReason: objective-failure
