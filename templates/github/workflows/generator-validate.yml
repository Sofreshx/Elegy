name: Generator Validate

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'contracts/fixtures/elegy-generator*.json'
      - 'contracts/schemas/elegy-generator*.json'

jobs:
  generator-validate:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build elegy
        working-directory: rust
        run: cargo build -p elegy-cli
      - name: Validate generator fixture
        shell: pwsh
        run: |
          ./target/debug/elegy.exe generator validate ../contracts/fixtures/elegy-generator.manifest.minimal.json --json
