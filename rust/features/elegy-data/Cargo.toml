[package]
name = "elegy-data"
version = "0.1.0"
publish = false
edition = "2021"
rust-version = "1.96"
license = "Apache-2.0"
authors = ["Elegy Contributors"]
repository = "https://github.com/Sofreshx/Elegy"

[dependencies]
serde = { version = "1.0.217", features = ["derive"] }
serde_json = "1.0.138"
thiserror = "2.0.11"
toml = "0.8.20"
csv = "1.3.1"
jsonschema = "0.17.1"
serde_yaml = "0.9.34"

[lints.rust]
unsafe_code = "forbid"

[lints.clippy]
dbg_macro = "deny"
todo = "deny"
unwrap_used = "deny"
